version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: easygame
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/easygame
      - JWT_SECRET=devsecret
    depends_on:
      - mongo
    ports:
      - '4000:4000'
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '3000:80'
volumes:
  mongo-data:
